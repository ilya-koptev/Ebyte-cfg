name: build-and-publish-apt

# Builds the .deb and publishes a flat APT repository into the `apt` branch on
# every push to main. The repo is served over raw.githubusercontent.com — no
# GitHub Pages setup required. Version auto-increments (1.0.<run>) so
# `apt upgrade` always sees a newer package.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apt-publish
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils

      - name: Build .deb
        run: bash packaging/build-deb.sh "1.0.${GITHUB_RUN_NUMBER}"

      - name: Assemble flat APT repo
        run: |
          rm -rf apt && mkdir -p apt
          cp ebyte-cfg_*_all.deb apt/
          cd apt
          dpkg-scanpackages --multiversion . > Packages
          gzip -9 -k -f Packages
          apt-ftparchive release . > Release
          ls -l

      - name: Publish to apt branch
        run: |
          cd apt
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -q -b apt
          git add -A
          git commit -q -m "apt repo 1.0.${GITHUB_RUN_NUMBER}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" apt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
